apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: hello-world
  namespace: hello-world
spec:
  interval: 5m
  chart:
    spec:
      chart: hello-world
      version: ">=1.0.0"
      sourceRef:
        kind: HelmRepository
        name: hello-world
        namespace: flux-system
  values:
    imagePullSecrets:
      - name: ghcr-secret
    image:
      tag: 1.0.2 # {"$imagepolicy": "flux-system:hello-world:tag"}
