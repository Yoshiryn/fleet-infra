apiVersion: apps/v1
kind: Deployment
metadata:
  name: podinfo-kustomize
spec:
  selector:
    matchLabels:
      app: podinfo-kustomize
  template:
    metadata:
      labels:
        app: podinfo-kustomize
    spec:
      containers:
        - name: podinfo-kustomized
          image: ghcr.io/stefanprodan/podinfo:6.11.2 # {"$imagepolicy": "flux-system:podinfo"}
