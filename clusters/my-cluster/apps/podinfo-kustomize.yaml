apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: podinfo-kustomize
  namespace: flux-system
spec:
  dependsOn:
    - name: sources
  interval: 5m
  path: ./apps/base/podinfo-kustomize
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  targetNamespace: podinfo