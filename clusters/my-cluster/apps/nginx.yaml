apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: nginx
  namespace: flux-system
spec:
  dependsOn:
    - name: infrastructure-sources
  interval: 5m
  path: ./apps/base/nginx
  prune: true
  sourceRef:
    kind: OCIRepository
    name: flux-system
  targetNamespace: nginx